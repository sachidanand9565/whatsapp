<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2145;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="120" rx="12" fill="url(#bgGrad)"/>

  <!-- Circle emblem -->
  <circle cx="58" cy="55" r="40" fill="none" stroke="url(#circleGrad)" stroke-width="2.5"/>

  <!-- Circuit dots on left -->
  <circle cx="18" cy="42" r="2.5" fill="#0ea5e9"/>
  <circle cx="18" cy="55" r="2.5" fill="#0ea5e9"/>
  <circle cx="18" cy="68" r="2.5" fill="#0ea5e9"/>
  <line x1="18" y1="42" x2="26" y2="42" stroke="#0ea5e9" stroke-width="1.5"/>
  <line x1="18" y1="55" x2="26" y2="55" stroke="#0ea5e9" stroke-width="1.5"/>
  <line x1="18" y1="68" x2="26" y2="68" stroke="#0ea5e9" stroke-width="1.5"/>
  <line x1="26" y1="42" x2="26" y2="55" stroke="#0ea5e9" stroke-width="1.5"/>

  <!-- Pixel scatter top-right of circle -->
  <rect x="88" y="18" width="5" height="5" rx="1" fill="#0ea5e9"/>
  <rect x="96" y="12" width="5" height="5" rx="1" fill="#0ea5e9" opacity="0.7"/>
  <rect x="96" y="22" width="4" height="4" rx="1" fill="#38bdf8"/>
  <rect x="104" y="16" width="4" height="4" rx="1" fill="#0ea5e9" opacity="0.5"/>

  <!-- S letter -->
  <text x="38" y="68" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="url(#sGrad)">S</text>

  <!-- K letter -->
  <text x="62" y="68" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="url(#kGrad)">K</text>

  <!-- SKWEBTEH text -->
  <text x="110" y="48" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2" fill="white">SK</text>
  <text x="144" y="48" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2" fill="#0ea5e9">WEB</text>
  <text x="202" y="48" font-family="Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2" fill="white">TEH</text>

  <!-- Divider line -->
  <line x1="110" y1="56" x2="265" y2="56" stroke="#0ea5e9" stroke-width="0.8" opacity="0.6"/>

  <!-- Tagline -->
  <text x="110" y="70" font-family="Arial, sans-serif" font-size="8" letter-spacing="2.5" fill="#94a3b8">INNOVATE</text>
  <circle cx="163" cy="67" r="1.5" fill="#0ea5e9"/>
  <text x="168" y="70" font-family="Arial, sans-serif" font-size="8" letter-spacing="2.5" fill="#94a3b8">DEVELOP</text>
  <circle cx="217" cy="67" r="1.5" fill="#0ea5e9"/>
  <text x="222" y="70" font-family="Arial, sans-serif" font-size="8" letter-spacing="2.5" fill="#94a3b8">ELEVATE</text>
</svg>
