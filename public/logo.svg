<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <!-- Bubble outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee16e"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <!-- Bubble inner fill gradient -->
    <radialGradient id="bubbleFill" cx="45%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#2d8b3a"/>
      <stop offset="60%" style="stop-color:#1a6b25"/>
      <stop offset="100%" style="stop-color:#0f4d18"/>
    </radialGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- ── SPEECH BUBBLE ── -->
  <g filter="url(#shadow)">
    <!-- White background circle (border effect) -->
    <circle cx="100" cy="88" r="78" fill="white"/>
    <!-- Outer green ring -->
    <circle cx="100" cy="88" r="74" fill="url(#ringGrad)"/>
    <!-- White inner ring (gap) -->
    <circle cx="100" cy="88" r="66" fill="white"/>
    <!-- Dark green bubble fill -->
    <circle cx="100" cy="88" r="62" fill="url(#bubbleFill)"/>
    <!-- Bubble tail (WhatsApp style) -->
    <path d="M 48 148 Q 36 172 20 178 Q 46 170 60 150 Z" fill="url(#ringGrad)"/>
    <path d="M 50 148 Q 40 168 26 173 Q 50 165 62 148 Z" fill="white"/>
    <path d="M 52 148 Q 43 164 30 168 Q 52 161 63 148 Z" fill="url(#bubbleFill)"/>
  </g>

  <!-- ── SK LETTERS inside bubble ── -->
  <!-- S letter -->
  <text x="38" y="112" font-family="Arial Black, Impact, sans-serif" font-size="68" font-weight="900" fill="white" letter-spacing="-3">S</text>

  <!-- K letter body (white) -->
  <text x="92" y="112" font-family="Arial Black, Impact, sans-serif" font-size="68" font-weight="900" fill="white" letter-spacing="-3">K</text>

  <!-- K diagonal accent (light green slash over K) -->
  <line x1="112" y1="58" x2="148" y2="85" stroke="#7dd87d" stroke-width="8" stroke-linecap="round"/>
  <line x1="112" y1="62" x2="154" y2="92" stroke="#a3f0a3" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- ── TEXT BELOW ── -->
  <!-- SK in green -->
  <text x="198" y="105" font-family="Arial Black, Impact, sans-serif" font-size="58" font-weight="900" fill="#16a34a" letter-spacing="-1">SK</text>
  <!-- WEB in dark -->
  <text x="268" y="105" font-family="Arial Black, Impact, sans-serif" font-size="58" font-weight="900" fill="#111827" letter-spacing="-1">WEB</text>
  <!-- TEH in green -->
  <text x="418" y="105" font-family="Arial Black, Impact, sans-serif" font-size="58" font-weight="900" fill="#16a34a" letter-spacing="-1">TEH</text>

  <!-- ── TAGLINE ── -->
  <!-- Left line -->
  <line x1="198" y1="125" x2="228" y2="125" stroke="#16a34a" stroke-width="2"/>
  <!-- Right line -->
  <line x1="462" y1="125" x2="492" y2="125" stroke="#16a34a" stroke-width="2"/>

  <!-- Tagline text -->
  <text x="235" y="130" font-family="Arial, sans-serif" font-size="11" letter-spacing="2.5" fill="#6b7280" font-weight="500">INNOVATE</text>
  <circle cx="305" cy="126.5" r="2.5" fill="#16a34a"/>
  <text x="313" y="130" font-family="Arial, sans-serif" font-size="11" letter-spacing="2.5" fill="#6b7280" font-weight="500">DEVELOP</text>
  <circle cx="381" cy="126.5" r="2.5" fill="#16a34a"/>
  <text x="389" y="130" font-family="Arial, sans-serif" font-size="11" letter-spacing="2.5" fill="#6b7280" font-weight="500">ELEVATE</text>
</svg>
